project:
  artifact_dir: artifacts
  seed: 42

data:
  competition: m5-forecasting-accuracy
  raw_dir: artifacts/data/raw
  processed_path: artifacts/data/processed_m5.csv
  featured_path: artifacts/data/featured_m5.csv
  submission_horizon: 28
  sample_top_n_series: 400
  min_history_days: 200
  valid_days: 28
  max_train_rows_for_lightgbm: 1500000

features:
  lags: [1, 7, 14, 28]
  rolling_windows: [7, 14, 28]
  add_price_change: true
  add_price_ratio_7: true
  add_event_flags: true
  add_snap_flags: true
  add_calendar_features: true

models:
  naive:
    seasonal_lag: 7

  lightgbm:
    target: y
    objective: regression
    learning_rate: 0.05
    num_leaves: 127
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 1
    min_data_in_leaf: 64
    n_estimators: 1200
    verbose: -1

  tft:
    max_encoder_length: 56
    max_prediction_length: 28
    hidden_size: 24
    attention_head_size: 4
    dropout: 0.1
    hidden_continuous_size: 16
    batch_size: 128
    max_epochs: 8
    gradient_clip_val: 0.1
    learning_rate: 0.03
    limit_train_batches: 1.0
    limit_val_batches: 1.0
    accelerator: auto
    devices: auto
    num_workers: 0
    reduce_on_plateau_patience: 2
    early_stopping_patience: 3
    top_n_series: 120
